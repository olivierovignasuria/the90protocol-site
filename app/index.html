<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 90 Protocol: Cockpit</title>
<meta name="description" content="The 90 Protocol: an instrument for founders in the first 90 days after shutting down a company. Restore operational lucidity. Raise the odds. No guaranteed comeback.">
<style>
  :root{
    --ink:#dfe9f6; --muted:#8593a6; --faint:#566476;
    --green:#3ee089; --amber:#ffc24a; --red:#ff5757;
    --blue:#5ad1ff; --violet:#b48cff; --line:#27313f; --glow:#5ad1ff;
    --metal1:#3a4456; --metal2:#171d27; --glass:#0a0f16; --panel:#0a0f16;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
    background:#05080c;-webkit-font-smoothing:antialiased;line-height:1.5}
  a{color:var(--blue)}
  button{font-family:inherit}
  .mono{font-family:"SF Mono",Menlo,Consolas,monospace}

  /* ---------- LAYOUT ---------- */
  .app{display:grid;grid-template-columns:284px 1fr;min-height:100vh}
  /* sidebar */
  .nav{background:linear-gradient(180deg,#0b0f16,#070a0f);border-right:1px solid #1b2330;
    padding:0 0 40px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{padding:18px 20px 14px;border-bottom:1px solid #1b2330}
  .brand .logo{font-size:14px;letter-spacing:3px;font-weight:800;color:var(--ink)}
  .brand .logo small{display:block;font-weight:400;letter-spacing:1.2px;font-size:10px;color:var(--faint);margin-top:3px}
  .navsec{padding:14px 12px 2px}
  .navsec .h{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);
    padding:4px 10px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;margin:1px 0;border-radius:8px;
    cursor:pointer;color:var(--muted);font-size:13px;border:1px solid transparent}
  .navitem:hover{background:#0e141d;color:var(--ink)}
  .navitem.active{background:#0e141d;border-color:#243042;color:var(--ink)}
  .navitem.cockpitlink{color:var(--blue);font-weight:700;letter-spacing:.5px}
  .navitem .chk{width:16px;height:16px;border-radius:50%;border:1.5px solid #36425a;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:10px;color:#05080c}
  .navitem .chk.done{background:var(--green);border-color:var(--green)}
  .navitem .lock{margin-left:auto;font-size:11px;color:var(--faint)}
  .navitem .num{font-size:10px;color:var(--faint);font-family:"SF Mono",monospace}
  .navitem .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .freepill{font-size:8.5px;letter-spacing:1px;color:var(--green);border:1px solid #1f5a3a;border-radius:4px;
    padding:1px 4px;text-transform:uppercase}

  /* main */
  .main{min-width:0}
  .topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;
    border-bottom:1px solid #1b2330;background:#0a0e14;position:sticky;top:0;z-index:20}
  .topbar .menu{background:#0e141d;border:1px solid #243042;color:var(--ink);border-radius:8px;padding:8px 12px;cursor:pointer}
  .content{max-width:920px;margin:0 auto;padding:26px 24px 80px}

  /* ---------- WELCOME / HOW IT WORKS ---------- */
  .wel-head{border-bottom:1px solid #1b2330;padding-bottom:18px;margin-bottom:18px}
  .wel-head h1{font-size:26px;margin:8px 0 10px;letter-spacing:.3px;line-height:1.25}
  .wel .lede{font-size:15px;line-height:1.7;color:#cdd8e8;margin:0;max-width:680px}
  .wel-card{background:linear-gradient(180deg,#0b1018,#090d13);border:1px solid #1b2330;
    border-radius:12px;padding:16px 18px;margin:14px 0}
  .wel-k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);
    font-weight:800;margin-bottom:10px}
  .wel-list{margin:0;padding-left:20px}
  .wel-list li{font-size:13.5px;line-height:1.65;color:#cdd8e8;margin:0 0 9px}
  .wel-list li:last-child{margin-bottom:0}
  .wel-list b{color:var(--ink)}
  .wel-p{font-size:13.5px;line-height:1.7;color:#cdd8e8;margin:0}
  .wel-cta-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:22px 0 6px}
  .wel-skip{font-size:12.5px;color:var(--muted);cursor:pointer;text-decoration:none;border-bottom:1px dotted #3a4658}
  .wel-skip:hover{color:var(--ink)}
  .wel-foot{color:#46525f;font-size:11.5px;margin-top:16px;line-height:1.7}

  /* ---------- COCKPIT ---------- */
  .ck-glare{background:linear-gradient(180deg,#11161f,#080b10);border:1px solid #222b38;border-bottom:none;
    border-radius:16px 16px 0 0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 -2px 0 #2a3543 inset;flex-wrap:wrap;gap:10px}
  .ck-glare .t{font-size:15px;letter-spacing:2px;font-weight:800}
  .ck-glare .t small{color:var(--muted);font-weight:400;letter-spacing:1px;font-size:11px}
  .ck-who{font-size:12px;color:var(--muted);text-align:right;line-height:1.5}
  .ck-who b{color:var(--ink)}
  .ck-tabs{display:flex;background:#0b0f16;border:1px solid #222b38;border-top:none}
  .ck-tabs button{flex:1;background:transparent;border:none;color:var(--muted);padding:11px;font-size:11.5px;
    letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent}
  .ck-tabs button.active{color:var(--glow);border-bottom-color:var(--glow);background:#0e141d}
  .dash{background:
      radial-gradient(120% 100% at 50% -20%,#1a212c,#0a0e14 60%),
      repeating-linear-gradient(45deg,#0c0f15 0 8px,#0a0d12 8px 16px);
    border:1px solid #222b38;border-top:none;border-radius:0 0 16px 16px;padding:22px 18px 20px;
    box-shadow:inset 0 2px 24px rgba(0,0,0,.7)}
  .toprow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
  @media(max-width:640px){.toprow{grid-template-columns:1fr}}
  .stat{background:#0a0f16;border:1px solid var(--line);border-radius:12px;padding:14px 16px;text-align:center}
  .stat .k{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:700}
  .stat .v{font-size:30px;font-weight:800;margin-top:6px;color:#bfe9ff;
    text-shadow:0 0 8px rgba(90,209,255,.4);font-variant-numeric:tabular-nums}
  .stat .v small{font-size:13px;color:var(--faint);text-shadow:none}
  .stat .sub{font-size:10px;color:var(--faint);margin-top:3px}
  .bar{height:7px;background:#10161f;border-radius:5px;overflow:hidden;margin-top:9px}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,#2f6a48,var(--green));border-radius:5px;transition:width .8s}

  .lanes-h{font-size:11px;letter-spacing:2px;color:#8da0b8;text-transform:uppercase;font-weight:700;
    margin:6px 0 12px;display:flex;align-items:center;gap:8px}
  .lanes{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:640px){.lanes{grid-template-columns:repeat(2,1fr)}}
  .lane{text-align:center}
  .lane .cap{font-size:10.5px;letter-spacing:1.5px;color:#8da0b8;text-transform:uppercase;font-weight:700}
  .lane .sub{font-size:9px;color:var(--faint);margin:1px 0 6px;letter-spacing:.5px}
  .lane svg{display:block;margin:0 auto}
  .lane .digi{font-family:"SF Mono",Menlo,monospace;font-size:18px;font-weight:700;margin-top:4px;
    color:#bfe9ff;text-shadow:0 0 8px rgba(90,209,255,.45);font-variant-numeric:tabular-nums}
  .lane .digi small{font-size:10px;color:var(--faint);text-shadow:none}
  .needle{transition:transform .9s cubic-bezier(.34,1.2,.4,1);transform-origin:110px 110px}

  .reading{margin-top:18px;background:#0a0f16;border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;font-size:13.5px;line-height:1.6}
  .reading b{color:var(--green)} .reading.warn b{color:var(--amber)}
  .annun{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .ann{font-family:"SF Mono",Menlo,monospace;font-size:10.5px;letter-spacing:1.5px;font-weight:700;
    padding:7px 12px;border-radius:6px;border:1px solid #243042;color:#3d4a5c;background:#0b0f15;min-width:90px;text-align:center}
  .ann.g{color:#1a0606;background:var(--green);border-color:#9affc8;box-shadow:0 0 12px rgba(62,224,137,.4)}
  .ann.a{color:#1c1404;background:var(--amber);border-color:#ffe2a3;box-shadow:0 0 12px rgba(255,194,74,.4)}
  .ann.r{color:#1a0606;background:var(--red);border-color:#ffb3b3;box-shadow:0 0 14px rgba(255,87,87,.6);
    animation:blink 1.1s steps(2,jump-none) infinite}
  @keyframes blink{50%{opacity:.55}}

  /* weekly card */
  .card{max-width:480px;margin:0 auto;background:
      radial-gradient(130% 90% at 50% -10%,#161d2a,#0a0e14 65%);
    border:1px solid #2a3543;border-radius:18px;padding:26px 24px;
    box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .card .ttl{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--blue);font-weight:800}
  .card .big{font-size:46px;font-weight:800;margin:14px 0 2px;color:#cfeeff;text-shadow:0 0 14px rgba(90,209,255,.4)}
  .card .crow{display:flex;justify-content:space-between;margin-top:18px;padding-top:16px;border-top:1px solid #1b2330}
  .card .cell{text-align:center;flex:1}
  .card .cell .n{font-size:22px;font-weight:800;color:var(--ink)}
  .card .cell .l{font-size:9.5px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;margin-top:2px}
  .card .ln{font-size:12px;color:var(--muted);margin-top:18px;line-height:1.6}
  .card .mk{font-size:10px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin-top:18px}

  .ck-foot{color:#46525f;font-size:11px;margin-top:18px;line-height:1.7}
  .ck-foot code{color:#6b7888}

  /* ---------- TOOL PANEL ---------- */
  .toolhead{border-bottom:1px solid #1b2330;padding-bottom:16px;margin-bottom:6px}
  .crumb{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);font-weight:700}
  .toolhead h1{font-size:26px;margin:8px 0 4px;letter-spacing:.3px}
  .tags{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
  .tag{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;padding:3px 8px;border-radius:5px;
    border:1px solid #243042;color:var(--muted)}
  .tag.free{color:var(--green);border-color:#1f5a3a}
  .tag.paid{color:var(--amber);border-color:#5a4a20}
  .intro{font-size:14.5px;line-height:1.7;color:#cdd8e8;margin:18px 0 8px}
  .intro p{margin:0 0 12px}

  .mech{background:#0a0f16;border:1px solid var(--line);border-left:3px solid var(--blue);
    border-radius:8px;padding:12px 14px;margin:18px 0;font-size:13px;color:var(--muted)}
  .mech b{color:var(--ink)}

  .step{background:linear-gradient(180deg,#0b1018,#090d13);border:1px solid #1b2330;border-radius:12px;
    padding:16px 18px;margin:14px 0}
  .step .lab{font-size:13px;font-weight:800;color:var(--blue);letter-spacing:.3px}
  .step .q{font-size:13.5px;color:#cdd8e8;margin:8px 0 10px;line-height:1.6}
  .step label.fl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);
    font-weight:700;display:block;margin-bottom:6px}
  .step textarea,.step input[type=text],.step input[type=date],.step input[type=number]{width:100%;background:#070a0f;border:1px solid #243042;border-radius:8px;
    color:var(--ink);font-family:inherit;font-size:13.5px;padding:11px 12px;resize:vertical;line-height:1.55}
  .step textarea{min-height:74px}
  .step textarea:focus,.step input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(90,209,255,.12)}
  /* native date/number: dark the picker UI + spinners to match the cockpit */
  .step input[type=date],.step input[type=number]{font-variant-numeric:tabular-nums}
  .step input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7) brightness(1.4);cursor:pointer;opacity:.8}
  .step input[type=date]::-webkit-calendar-picker-indicator:hover{opacity:1}
  .step input[type=date]{color-scheme:dark}
  .step input[type=number]{color-scheme:dark}

  /* number with a currency prefix and/or a unit suffix */
  .numwrap{display:flex;align-items:stretch;background:#070a0f;border:1px solid #243042;border-radius:8px;overflow:hidden}
  .numwrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 2px rgba(90,209,255,.12)}
  .numwrap input[type=number]{flex:1;min-width:0;background:transparent;border:none;border-radius:0;
    color:#bfe9ff;font-variant-numeric:tabular-nums;font-weight:700;font-size:15px}
  .numwrap input[type=number]:focus{box-shadow:none}
  .numfix{display:flex;align-items:center;padding:0 12px;font-family:"SF Mono",Menlo,monospace;font-size:13px;
    color:var(--muted);background:#0b1018;border-color:#243042}
  .numfix.pre{border-right:1px solid #1b2330;color:#8da0b8}
  .numfix.unit{border-left:1px solid #1b2330;color:var(--faint);letter-spacing:.5px}

  /* computed: read-only auto-calculated output, looks like an instrument readout */
  .computed{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:radial-gradient(120% 100% at 50% -30%,#11202a,#080d13 70%);
    border:1px solid #1f3a44;border-radius:8px;padding:12px 14px}
  .computed .cval{font-family:"SF Mono",Menlo,monospace;font-size:20px;font-weight:800;color:#7fe3ff;
    text-shadow:0 0 10px rgba(90,209,255,.4);font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .computed .ctag{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:#1a0606;background:var(--blue);
    border-radius:4px;padding:2px 7px;font-weight:800}
  .scalewrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .scalewrap input[type=range]{flex:1;min-width:160px;accent-color:var(--blue)}
  .scaleval{font-family:"SF Mono",monospace;font-size:20px;font-weight:800;color:#bfe9ff;min-width:54px;text-align:center}
  .marco{margin-top:12px}
  .marco summary{cursor:pointer;font-size:12px;letter-spacing:.5px;color:var(--violet);
    list-style:none;display:inline-flex;align-items:center;gap:6px;user-select:none}
  .marco summary::-webkit-details-marker{display:none}
  .marco summary::before{content:"▸";transition:transform .2s;color:var(--violet)}
  .marco[open] summary::before{transform:rotate(90deg)}
  .marco .body{margin-top:10px;background:#0a0f16;border:1px dashed #2a3a4f;border-radius:8px;
    padding:12px 14px;font-size:13px;color:#aebccd;line-height:1.65;white-space:pre-wrap}

  .gate{position:relative}
  .gate .lockoverlay{margin-top:14px;background:linear-gradient(180deg,#0d1219,#0a0e14);
    border:1px solid #3a3320;border-radius:14px;padding:24px 22px;text-align:center}
  .gate .lockoverlay .ico{font-size:26px}
  .gate .lockoverlay h3{margin:8px 0 6px;font-size:17px;color:var(--amber)}
  .gate .lockoverlay p{font-size:13px;color:var(--muted);max-width:460px;margin:0 auto 16px;line-height:1.6}
  .cta{display:inline-block;background:linear-gradient(180deg,#ffd27a,#ffb43a);color:#1c1404;
    font-weight:800;font-size:14px;letter-spacing:.4px;border:none;border-radius:10px;padding:13px 24px;
    cursor:pointer;text-decoration:none;box-shadow:0 6px 20px rgba(255,180,58,.25)}
  .cta:hover{filter:brightness(1.05)}
  .cta.sec{background:transparent;color:var(--blue);border:1px solid #243042;box-shadow:none;margin-left:8px}

  .toolfoot{display:flex;align-items:center;justify-content:space-between;gap:14px;
    margin-top:26px;padding-top:18px;border-top:1px solid #1b2330;flex-wrap:wrap}
  .savestate{font-size:11.5px;color:var(--faint)}
  .markbtn{background:#0e141d;border:1px solid #243042;color:var(--ink);border-radius:10px;
    padding:11px 20px;font-size:13.5px;font-weight:700;cursor:pointer}
  .markbtn.done{background:var(--green);color:#05140b;border-color:var(--green)}
  .navbtns{display:flex;gap:8px}
  .navbtns button{background:#0e141d;border:1px solid #243042;color:var(--muted);border-radius:8px;
    padding:9px 14px;font-size:12.5px;cursor:pointer}
  .navbtns button:hover{color:var(--ink)}

  .bridge{margin-top:22px;background:radial-gradient(120% 90% at 50% 0%,#13202a,#0a0e14 70%);
    border:1px solid #1f3a44;border-radius:14px;padding:20px 22px}
  .bridge h3{margin:0 0 8px;font-size:16px;color:var(--blue)}
  .bridge p{font-size:13.5px;color:#cdd8e8;line-height:1.65;margin:0 0 14px}

  /* referral copy-link (quiet, muted footnote styling) */
  .refline{margin-top:14px;font-size:11.5px;color:var(--faint);line-height:1.6;
    display:flex;flex-wrap:wrap;align-items:center;gap:8px;justify-content:center;text-align:center}
  .refline .reftxt{max-width:420px}
  .refbtn{background:#0e141d;border:1px solid #243042;color:var(--blue);border-radius:8px;
    padding:7px 14px;font-size:11.5px;font-weight:700;cursor:pointer;letter-spacing:.3px}
  .refbtn:hover{color:var(--ink)}
  .refbtn.copied{color:var(--green);border-color:#1f5a3a}

  /* booking disclosure + consent modal (GDPR/firewall gate before CALL_URL) */
  .bookmodal{display:none;position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.62);
    align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px}
  .bookmodal.show{display:flex}
  .bookmodal .sheet{background:linear-gradient(180deg,#0d1219,#0a0e14);border:1px solid #3a3320;
    border-radius:14px;padding:24px 22px;max-width:520px;width:100%;margin:auto}
  .bookmodal h3{margin:0 0 12px;font-size:17px;color:var(--amber)}
  .bookmodal p{font-size:13px;color:var(--muted);line-height:1.65;margin:0 0 12px}
  .bookmodal .consent{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink);
    line-height:1.55;margin:16px 0;cursor:pointer}
  .bookmodal .consent input{margin-top:2px;accent-color:var(--blue);width:16px;height:16px;flex:0 0 auto}
  .bookmodal .acts{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:6px}
  .bookmodal .cta[disabled]{opacity:.45;cursor:not-allowed;filter:none;box-shadow:none}
  .bookmodal .bk-not{background:transparent;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;
    text-decoration:none;border-bottom:1px dotted #3a4658;padding:0 0 1px}
  .bookmodal .bk-not:hover{color:var(--ink)}

  /* mobile */
  .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30}
  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .topbar{display:flex}
    .nav{position:fixed;left:0;top:0;z-index:40;width:284px;transform:translateX(-100%);transition:transform .25s}
    .nav.open{transform:translateX(0)}
    .backdrop.show{display:block}
  }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="nav" id="nav">
    <div class="brand">
      <div class="logo">THE 90 PROTOCOL<small>cockpit · first 90 days after the close</small></div>
    </div>
    <div class="navsec">
      <div class="navitem cockpitlink" data-go="cockpit">
        <span class="chk" id="chk-cockpit">◆</span><span class="lbl">The Cockpit</span>
      </div>
    </div>
    <div id="navtree"></div>
    <div class="navsec" style="margin-top:8px">
      <div class="navitem" data-go="welcome" style="color:var(--faint)">
        <span class="chk" style="border:none">·</span><span class="lbl">How it works</span>
      </div>
      <div class="navitem" data-go="about" style="color:var(--faint)">
        <span class="chk" style="border:none">·</span><span class="lbl">About this instrument</span>
      </div>
      <a class="navitem" href="/the-90/kit/" style="color:var(--faint);text-decoration:none">
        <span class="chk" style="border:none">·</span><span class="lbl">Your included kit</span>
      </a>
    </div>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <!-- booking disclosure + consent gate (populated by app.js, shown before any CALL_URL) -->
  <div class="bookmodal" id="bookModal" role="dialog" aria-modal="true" aria-labelledby="bookModalH"></div>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="menu" id="menuBtn">☰ Modules</button>
      <div class="mono" style="font-size:12px;letter-spacing:2px;color:var(--muted)">THE 90 PROTOCOL</div>
      <div style="width:90px"></div>
    </div>
    <div class="content" id="view"></div>
