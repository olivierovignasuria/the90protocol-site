<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The 90 Protocol — auth callback</title>
  <style>
    body{background:#0b0f14;color:#9fb3c8;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0;padding:24px}
    .card{max-width:560px;text-align:center}
    code{display:block;background:#121821;color:#37d0a0;padding:14px;border-radius:10px;margin-top:16px;
         word-break:break-all;font-size:13px}
    h1{color:#fff;font-size:20px;margin:0 0 8px}
    button{margin-top:14px;background:#37d0a0;color:#06281f;border:0;padding:10px 16px;border-radius:8px;
           font-weight:600;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h1>Authorization received</h1>
    <p>Copia il codice qui sotto e incollalo nella sessione (serve una sola volta).</p>
    <code id="out">nessun parametro nella URL</code>
    <button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent||'')">Copia il code</button>
  </div>
  <script>
    var q = new URLSearchParams(location.search);
    var code = q.get('code') || '';
    var err = q.get('error') || q.get('error_description') || '';
    var out = document.getElementById('out');
    if (code) { out.innerHTML = 'code = <span id="code">'+code+'</span>'; }
    else if (err) { out.textContent = 'errore: '+err; }
  </script>
</body>
</html>
